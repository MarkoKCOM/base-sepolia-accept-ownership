<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accept Base Sepolia Escrow Ownership</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0b0f14;
        color: #eef3f8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(620px, 100%);
        border: 1px solid #243241;
        border-radius: 8px;
        background: #111822;
        padding: 24px;
        box-shadow: 0 18px 60px rgb(0 0 0 / 0.32);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #aab7c4;
        line-height: 1.5;
      }

      dl {
        display: grid;
        gap: 12px;
        margin: 20px 0;
      }

      dt {
        color: #7f91a4;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      dd {
        margin: 4px 0 0;
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        color: #dce8f3;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #2f8cff;
        color: white;
        font-weight: 700;
        font-size: 15px;
        min-height: 46px;
        padding: 0 18px;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 42px;
        margin-top: 18px;
        padding: 12px;
        border-radius: 8px;
        background: #0b1119;
        border: 1px solid #1e2a37;
        color: #aab7c4;
        font-size: 14px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .ok {
        color: #7ce7a0;
      }

      .err {
        color: #ff8f8f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Accept Escrow Ownership</h1>
      <p>Connect the owner wallet on Base Sepolia and submit the pending ownership acceptance.</p>

      <dl>
        <div>
          <dt>Required wallet</dt>
          <dd id="required-wallet">0x35C76bF5A701A30629d9706F4c8f77a4a0cA5978</dd>
        </div>
        <div>
          <dt>Escrow contract</dt>
          <dd id="contract-address">0x7edf75ceB2441d80aBC6599CeB4E62Eeb23BB2a9</dd>
        </div>
        <div>
          <dt>Network</dt>
          <dd>Base Sepolia, chain ID 84532</dd>
        </div>
      </dl>

      <button id="accept-button" type="button">Connect Wallet And Accept Ownership</button>
      <div id="status" class="status">Ready.</div>
    </main>

    <script type="module">
      import { BrowserProvider, Contract, getAddress } from "https://cdn.jsdelivr.net/npm/ethers@6.13.4/+esm";

      const chainIdHex = "0x14a34";
      const requiredWallet = "0x35C76bF5A701A30629d9706F4c8f77a4a0cA5978";
      const escrowAddress = "0x7edf75ceB2441d80aBC6599CeB4E62Eeb23BB2a9";
      const abi = [
        "function owner() view returns (address)",
        "function pendingOwner() view returns (address)",
        "function acceptOwnership()"
      ];

      const button = document.querySelector("#accept-button");
      const status = document.querySelector("#status");

      function setStatus(message, kind = "") {
        status.className = "status " + kind;
        status.textContent = message;
      }

      async function ensureBaseSepolia() {
        const current = await window.ethereum.request({ method: "eth_chainId" });
        if (current === chainIdHex) return;

        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: chainIdHex }]
          });
        } catch (error) {
          if (error.code !== 4902) throw error;
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [
              {
                chainId: chainIdHex,
                chainName: "Base Sepolia",
                nativeCurrency: { name: "Sepolia Ether", symbol: "ETH", decimals: 18 },
                rpcUrls: ["https://sepolia.base.org"],
                blockExplorerUrls: ["https://sepolia.basescan.org"]
              }
            ]
          });
        }
      }

      button.addEventListener("click", async () => {
        button.disabled = true;
        try {
          if (!window.ethereum) {
            throw new Error("No injected wallet found. Open this file in MetaMask, Rabby, or a wallet browser.");
          }

          setStatus("Connecting wallet...");
          const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
          const account = getAddress(accounts[0]);
          if (account !== getAddress(requiredWallet)) {
            throw new Error("Wrong wallet connected. Connected " + account + ", expected " + requiredWallet + ".");
          }

          setStatus("Switching to Base Sepolia...");
          await ensureBaseSepolia();

          const provider = new BrowserProvider(window.ethereum);
          const signer = await provider.getSigner();
          const escrow = new Contract(escrowAddress, abi, signer);

          const pendingOwner = await escrow.pendingOwner();
          if (getAddress(pendingOwner) !== getAddress(requiredWallet)) {
            throw new Error("This wallet is not pendingOwner. Current pendingOwner is " + pendingOwner + ".");
          }

          setStatus("Submitting acceptOwnership transaction...");
          const tx = await escrow.acceptOwnership();
          setStatus("Transaction sent: " + tx.hash + "\nWaiting for confirmation...");
          await tx.wait();

          const owner = await escrow.owner();
          setStatus("Done. New owner is " + owner + ".", "ok");
        } catch (error) {
          setStatus(error?.message || String(error), "err");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
